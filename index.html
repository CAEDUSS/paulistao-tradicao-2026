<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paulistão da Tradição 2026</title>
    <style>
        :root {
            --primary: #06aa48;
            --primary-dark: #048a3a;
            --bg: #f4f7f6;
            --text: #333;
            --white: #ffffff;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            background: var(--bg); 
            color: var(--text);
            line-height: 1.6;
        }

        header { 
            background: var(--primary); 
            color: white; 
            padding: 2rem 1rem; 
            text-align: center; 
            box-shadow: var(--shadow);
        }

        header h1 { margin: 0; font-size: 1.8rem; text-transform: uppercase; letter-spacing: 2px; }

        nav { 
            display: flex; 
            justify-content: center; 
            background: var(--white); 
            padding: 10px; 
            position: sticky; 
            top: 0; 
            z-index: 100;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        nav button { 
            padding: 12px 24px; 
            border: none; 
            background: none;
            cursor: pointer; 
            font-weight: bold; 
            color: #666;
            transition: 0.3s;
            border-bottom: 3px solid transparent;
        }

        nav button.active { 
            color: var(--primary); 
            border-bottom-color: var(--primary);
        }

        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }

        section { display: none; animation: fadeIn 0.5s ease; }
        section.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { 
            background: var(--white); 
            padding: 20px; 
            margin-bottom: 20px; 
            border-radius: 12px; 
            box-shadow: var(--shadow);
        }

        h2 { color: var(--primary); border-left: 5px solid var(--primary); padding-left: 10px; margin-top: 0; }

        /* Tabela Estilizada */
        table { width: 100%; border-collapse: collapse; overflow: hidden; border-radius: 8px; }
        th { background: #eee; color: #555; text-transform: uppercase; font-size: 0.85rem; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid #eee; }
        tr:last-child td { border-bottom: none; }
        .g4 { background-color: rgba(6, 170, 72, 0.1); }

        /* Jogos e Inputs */
        .match-row { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 10px 0;
            border-bottom: 1px dashed #eee;
        }
        .match-row:last-child { border-bottom: none; }
        .team-name { flex: 1; font-weight: 500; font-size: 0.95rem; }
        .team-right { text-align: right; }
        
        .score-container { display: flex; align-items: center; gap: 8px; }
        input[type="number"] { 
            width: 45px; 
            padding: 8px; 
            text-align: center; 
            border: 2px solid #ddd; 
            border-radius: 6px; 
            font-weight: bold;
            outline: none;
            transition: 0.2s;
        }
        input[type="number"]:focus { border-color: var(--primary); }

        /* Versão Mobile */
        @media (max-width: 480px) {
            .team-name { font-size: 0.8rem; }
            nav button { padding: 10px 12px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

<header>
    <h1>Paulistão da Tradição 2026</h1>
</header>

<nav id="menu">
    <button onclick="trocar('tabela')" class="active">Tabela</button>
    <button onclick="trocar('rodadas')">Rodadas</button>
    <button onclick="trocar('mata')">Finais</button>
</nav>

<div class="container">
    <section id="tabela" class="active">
        <h2>Classificação</h2>
        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th style="text-align: left;">Equipe</th>
                        <th>Pts</th>
                        <th>SG</th>
                    </tr>
                </thead>
                <tbody id="tbody"></tbody>
            </table>
        </div>
    </section>

    <section id="rodadas">
        <h2>Confrontos</h2>
        <div id="jogos"></div>
    </section>

    <section id="mata">
        <h2>Fase Eliminatória</h2>
        <div id="mataDiv"></div>
    </section>
</div>

<script>
const rodadas = [
    { nome: "1ª Rodada", jogos: [["Legião Sorocabana","Romanos"],["Milites Peregrinus","Pão de Queijo"],["Galícia","Oratório"]] },
    { nome: "2ª Rodada", jogos: [["Milites Peregrinus","Oratório"],["Legião Sorocabana","Pão de Queijo"],["Trad Fut","Romanos"]] },
    { nome: "3ª Rodada", jogos: [["Romanos","Oratório"],["Trad Fut","Pão de Queijo"],["Legião Sorocabana","Galícia"]] },
    { nome: "4ª Rodada", jogos: [["Trad Fut","Oratório"],["Pão de Queijo","Galícia"],["Romanos","Milites Peregrinus"]] },
    { nome: "5ª Rodada", jogos: [["Trad Fut","Galícia"],["Legião Sorocabana","Milites Peregrinus"],["Oratório","Pão de Queijo"]] },
    { nome: "6ª Rodada", jogos: [["Trad Fut","Milites Peregrinus"],["Galícia","Romanos"],["Oratório","Legião Sorocabana"]] },
    { nome: "7ª Rodada", jogos: [["Trad Fut","Legião Sorocabana"],["Milites Peregrinus","Galícia"],["Romanos","Pão de Queijo"]] }
];

let dados = JSON.parse(localStorage.getItem("dados_paulistao_2026")) || {};

function trocar(id){
    document.querySelectorAll("section").forEach(s => s.classList.remove("active"));
    document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    event.currentTarget.classList.add("active");
}

function renderRodadas(){
    const jogosDiv = document.getElementById("jogos");
    jogosDiv.innerHTML = "";

    rodadas.forEach((rodada, i) => {
        let card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `<strong>${rodada.nome}</strong><br><br>`;
        
        rodada.jogos.forEach((j, idx) => {
            let key = `${i}-${idx}`;
            let g1 = dados[key]?.g1 ?? "";
            let g2 = dados[key]?.g2 ?? "";
            
            card.innerHTML += `
            <div class="match-row">
                <span class="team-name">${j[0]}</span>
                <div class="score-container">
                    <input type="number" min="0" value="${g1}" oninput="salvar('${key}',0,this.value)">
                    <span>x</span>
                    <input type="number" min="0" value="${g2}" oninput="salvar('${key}',1,this.value)">
                </div>
                <span class="team-name team-right">${j[1]}</span>
            </div>`;
        });
        jogosDiv.appendChild(card);
    });
}

function salvar(k, lado, v){
    if(!dados[k]) dados[k] = { g1: null, g2: null };
    let valor = v === "" ? null : parseInt(v);
    if(lado === 0) dados[k].g1 = valor;
    else dados[k].g2 = valor;
    
    localStorage.setItem("dados_paulistao_2026", JSON.stringify(dados));
    calcular();
}

function calcular(){
    let tabela = {};
    const equipes = ["Legião Sorocabana", "Romanos", "Milites Peregrinus", "Pão de Queijo", "Galícia", "Oratório", "Trad Fut"];
    
    equipes.forEach(eq => tabela[eq] = { pts: 0, sg: 0 });

    Object.entries(dados).forEach(([k, v]) => {
        if(v.g1 === null || v.g2 === null) return;
        let [r, i] = k.split("-");
        let j = rodadas[r].jogos[i];

        if(!tabela[j[0]] || !tabela[j[1]]) return;

        tabela[j[0]].sg += (v.g1 - v.g2);
        tabela[j[1]].sg += (v.g2 - v.g1);

        if(v.g1 > v.g2) tabela[j[0]].pts += 3;
        else if(v.g2 > v.g1) tabela[j[1]].pts += 3;
        else { tabela[j[0]].pts++; tabela[j[1]].pts++; }
    });

    let rank = Object.entries(tabela).sort((a,b) => b[1].pts - a[1].pts || b[1].sg - a[1].sg);
    
    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";
    rank.forEach((r, i) => {
        tbody.innerHTML += `
        <tr class="${i < 4 ? 'g4' : ''}">
            <td>${i + 1}</td>
            <td style="text-align: left;">${i === 0 ? '🥇 ' : ''}${r[0]}</td>
            <td><strong>${r[1].pts}</strong></td>
            <td>${r[1].sg}</td>
        </tr>`;
    });

    renderMata(rank);
}

function renderMata(rank){
    let div = document.getElementById("mataDiv");
    div.innerHTML = `
    <div class='card'>
        <h3>Cruzamento Olímpico</h3>
        <p><strong>SF 1:</strong> ${rank[0][0]} (1º) x ${rank[3][0]} (4º)</p>
        <p><strong>SF 2:</strong> ${rank[1][0]} (2º) x ${rank[2][0]} (3º)</p>
        <hr style="border:0; border-top:1px solid #eee; margin:15px 0;">
        <small>Os vencedores disputam a Final e os perdedores o 3º lugar.</small>
    </div>`;
}

// Inicialização
renderRodadas();
calcular();
</script>

</body>
</html>
