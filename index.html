<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paulistão da Tradição 2026</title>
    <style>
        :root { --primary: #06aa48; --bg: #e9ecef; --white: #ffffff; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); color: #333; }
        header { background: var(--primary); color: white; padding: 20px; text-align: center; }
        .info-bar { background: #048a3a; color: white; padding: 8px; font-size: 0.8rem; text-align: center; }
        
        nav { display: flex; justify-content: center; background: var(--white); position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        nav button { padding: 15px 20px; border: none; background: none; cursor: pointer; font-weight: bold; color: #666; }
        nav button.active { color: var(--primary); border-bottom: 4px solid var(--primary); }

        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }
        section { display: none; }
        section.active { display: block; }

        .card { background: var(--white); padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { border-left: 5px solid var(--primary); padding-left: 10px; margin: 0 0 15px 0; font-size: 1.2rem; }

        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px 5px; text-align: center; border-bottom: 1px solid #eee; }
        .match-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
        .team { flex: 1; font-size: 0.9rem; }
        .score-inputs { display: flex; gap: 5px; }
        input { width: 35px; height: 30px; text-align: center; border: 1px solid #ccc; border-radius: 4px; }
        
        .regra { margin-bottom: 8px; font-size: 0.9rem; border-bottom: 1px solid #eee; padding-bottom: 5px; }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0">Paulistão da Tradição 2026</h1>
</header>
<div class="info-bar">
    📍 Rancho Paumar (Itatiba) | 🕒 13:00 Início | ⏱️ 12 min por jogo
</div>

<nav>
    <button onclick="trocar('tabela')" id="btn-tabela" class="active">Tabela</button>
    <button onclick="trocar('rodadas')" id="btn-rodadas">Rodadas</button>
    <button onclick="trocar('mata')" id="btn-mata">Finais</button>
    <button onclick="trocar('regras')" id="btn-regras">Regras</button>
</nav>

<div class="container">
    <section id="tabela" class="active">
        <div class="card">
            <h2>Classificação</h2>
            <table>
                <thead><tr><th>#</th><th style="text-align:left">Equipe</th><th>Pts</th><th>SG</th></tr></thead>
                <tbody id="tbody"></tbody>
            </table>
        </div>
    </section>
